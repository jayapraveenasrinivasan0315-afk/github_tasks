  name: Terraform Apply
  on:
    workflow_dispatch:
      inputs:
        environment:
          description: 'Environment to deploy to'
          required: true
          default: 'development'
        plan_run_number:
          description: 'Run number of the plan to apply (from terraform-plan workflow)'
          required: true
          type: string
permissions:
  contents: read
  id-token: write
  security-events: write
  jobs:
    apply:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
        - name: Setup Terraform
          uses: hashicorp/setup-terraform@v3
        - name: Authenticate to Google Cloud
          uses: google-github-actions/auth@v2
          with:
            workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
            service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_01 }}
        - name: Set up Cloud SDK
          uses: google-github-actions/setup-gcloud@v2
        - name: download the plan artifacts
          uses: dawidd6/action-download-artifact@v3
          with:
            workflow: terraform-plan.yml
            run_number: ${{ github.event.inputs.plan_run_number }}
            name: tfplan-${{ github.event.inputs.environment }}-${{ github.event.inputs.plan_run_number }}
            github_token: ${{ secrets.GITHUB_TOKEN }}
        - name: Terraform Init
          run: terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=${{ github.event.inputs.environment }}/terraform.tfstate"
        - name: terraform apply
          run: terraform apply \
            -var="project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var="region=${{ vars.GCP_REGION }}" \
            -var="environment=${{ github.event.inputs.environment }}" \
            -auto-approve \
            tfplan-${{ github.event.inputs.environment }}-${{ github.event.inputs.plan_run_number }}/tfplan.tfplan
        
          