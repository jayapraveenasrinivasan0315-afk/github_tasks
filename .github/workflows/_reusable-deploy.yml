name: Reusable Deploy Workflow

on:
  workflow_call:
    inputs:
      environment:
        default: development
        type: string
      deployment_type:
        required: true
        type: string
      app_path:
        required: true
        type: string
      app_name:
        required: true
        type: string
      artifact_name:
        required: true
        type: string
      region:
        default: asia-south1
        type: string
      artifact_repo:
        required: false
        type: string
        default: backend-repo
      GCS_BUCKET_NAME:
        required: false
        type: string
    secrets:
      GCP_PROJECT_ID:
        required: true
      GCP_SERVICE_ACCOUNT:
        required: true
      WORKLOAD_IDENTITY_PROVIDER:
        required: true
      MONGODB_URI:
        required: false

permissions:
  contents: read
  id-token: write
  security-events: write

concurrency:
  group: deploy-${{ inputs.app_name }}-${{ inputs.environment }}
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate deployment type
        env:
          DEPLOYMENT_TYPE: ${{ inputs.deployment_type }}
        run: |
          if [ "$DEPLOYMENT_TYPE" != "frontend" ] && [ "$DEPLOYMENT_TYPE" != "backend" ]; then
            echo "Invalid deployment type"
            exit 1
          fi

      - name: Validate app path
        env:
          APP_PATH: ${{ inputs.app_path }}
        run: |
          if [ ! -d "$APP_PATH" ]; then
            echo "App path not found"
            exit 1
          fi

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep scan --config=p/default --sarif --output=semgrep.sarif
        continue-on-error: true

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: sast
        continue-on-error: true

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        if: inputs.deployment_type == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        if: inputs.deployment_type == 'frontend'
        working-directory: ${{ inputs.app_path }}
        run: npm ci

      - name: Run npm audit
        if: inputs.deployment_type == 'frontend'
        working-directory: ${{ inputs.app_path }}
        run: npm audit --audit-level=critical

      - name: Build frontend
        if: inputs.deployment_type == 'frontend'
        working-directory: ${{ inputs.app_path }}
        env:
          VITE_BASE_PATH: https://storage.googleapis.com/${{ inputs.GCS_BUCKET_NAME }}/
        run: npm run build

      - name: Debug dist output
        if: inputs.deployment_type == 'frontend'
        run: find ${{ inputs.app_path }}/dist -type f | sort

      - name: Upload frontend build artifact
        if: inputs.deployment_type == 'frontend'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.app_path }}/dist
          retention-days: 1

      - name: Set up Docker Buildx
        if: inputs.deployment_type == 'backend'
        uses: docker/setup-buildx-action@v3

      - name: Build and export backend Docker image
        if: inputs.deployment_type == 'backend'
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.app_path }}
          tags: |
            ${{ inputs.app_name }}:${{ github.sha }}
            ${{ inputs.app_name }}:latest
          load: true
          push: false
          outputs: type=docker,dest=/tmp/${{ inputs.app_name }}.tar

      - name: Load Docker image from tar
        if: inputs.deployment_type == 'backend'
        env:
          APP_NAME: ${{ inputs.app_name }}
        run: docker load --input /tmp/$APP_NAME.tar

      - name: Verify image loaded
        if: inputs.deployment_type == 'backend'
        run: docker images | grep ${{ inputs.app_name }}

      - name: Run Trivy image scan
        if: inputs.deployment_type == 'backend'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.app_name }}:${{ github.sha }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL
          exit-code: 0
          ignore-unfixed: true
        continue-on-error: true

      - name: Upload Trivy SARIF
        if: inputs.deployment_type == 'backend' && always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
          category: docker-image-scan
        continue-on-error: true

      - name: Upload backend build artifact
        if: inputs.deployment_type == 'backend'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: /tmp/${{ inputs.app_name }}.tar
          retention-days: 1

  validate-mongodb:
    needs: build
    runs-on: ubuntu-latest
    if: inputs.deployment_type == 'backend'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pymongo and test connection
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          pip install pymongo --quiet
          python3 - <<'EOF'
          import os, sys
          from pymongo import MongoClient
          from pymongo.errors import ConnectionFailure

          uri = os.environ.get("MONGODB_URI")
          if not uri:
              print("MONGODB_URI not set, skipping connection test")
              sys.exit(0)

          try:
              client = MongoClient(uri, serverSelectionTimeoutMS=5000)
              client.admin.command("ping")
              print("MongoDB connection successful")
          except ConnectionFailure as e:
              print(f"MongoDB connection failed: {e}")
              sys.exit(1)
          EOF

  deploy:
    needs: [build, validate-mongodb]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ./build-output

      - name: Debug build output
        if: inputs.deployment_type == 'frontend'
        run: find ./build-output -type f | sort

      - name: Load Docker image
        if: inputs.deployment_type == 'backend'
        env:
          APP_NAME: ${{ inputs.app_name }}
        run: docker load --input ./build-output/$APP_NAME.tar

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy frontend to Google Cloud Storage
        if: inputs.deployment_type == 'frontend'
        run: |
          gsutil -m cp -r ./build-output/* gs://${{ inputs.GCS_BUCKET_NAME }}/

      - name: Verify GCS upload
        if: inputs.deployment_type == 'frontend'
        run: |
          echo "Files in GCS bucket:"
          gsutil ls -r gs://${{ inputs.GCS_BUCKET_NAME }}/

      - name: Authenticate Docker to Artifact Registry
        if: inputs.deployment_type == 'backend'
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Build & Push Docker image
        if: inputs.deployment_type == 'backend'
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.app_path }}
          tags: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ inputs.artifact_repo }}/${{ inputs.app_name }}:${{ github.sha }}
          push: true

      - name: Deploy to Cloud Run
        if: inputs.deployment_type == 'backend'
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ inputs.app_name }}
          image: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ inputs.artifact_repo }}/${{ inputs.app_name }}:${{ github.sha }}
          region: ${{ inputs.region }}
          platform: managed
          allow-unauthenticated: true
          env_vars: |
            MONGODB_URL=${{ secrets.MONGODB_URI }}
            DB_NAME=myapp