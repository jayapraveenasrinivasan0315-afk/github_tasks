        if: inputs.deployment_type == 'backend'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.app_name }}:${{ github.sha }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: inputs.deployment_type == 'backend' && always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
          category: docker-image-scan
