name: Reusable Deploy Workflow

on:
  workflow_call:
    inputs:
      environment:
        default: development
        type: string
      deployment_type:
        required: true
        type: string
      app_path:
        required: true
        type: string
      app_name:
        required: true
        type: string
      artifact_name:
        required: true
        type: string
      region:
        default: asia-south1
        type: string
      artifact_repo:
        required: false
        type: string
        default: backend-repo
      GCS_BUCKET_NAME:
        required: false
        type: string
    secrets:
      GCP_PROJECT_ID:
        required: true
      # GCS_BUCKET_NAME:
      #   required: true
      GCP_SERVICE_ACCOUNT:
        required: true
      WORKLOAD_IDENTITY_PROVIDER:
        required: true

permissions:
  contents: read
  id-token: write
  security-events: write

concurrency:
  group: deploy-${{ inputs.app_name }}-${{ inputs.environment }}
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate deployment type
        env:
          DEPLOYMENT_TYPE: ${{ inputs.deployment_type }}
        run: |
          if [ "$DEPLOYMENT_TYPE" != "frontend" ] && [ "$DEPLOYMENT_TYPE" != "backend" ]; then
            echo "Invalid deployment type"
            exit 1
          fi

      - name: Validate app path
        env:
          APP_PATH: ${{ inputs.app_path }}
        run: |
          if [ ! -d "$APP_PATH" ]; then
            echo "App path not found"
            exit 1
          fi

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep scan --config=p/default --sarif --output=semgrep.sarif
        continue-on-error: true

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: sast
        continue-on-error: true

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        if: inputs.deployment_type == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        if: inputs.deployment_type == 'frontend'
        working-directory: ${{ inputs.app_path }}
        run: npm ci

      - name: Run npm audit
        if: inputs.deployment_type == 'frontend'
        working-directory: ${{ inputs.app_path }}
        run: npm audit --audit-level=critical

      - name: Build frontend
        if: inputs.deployment_type == 'frontend'
        working-directory: ${{ inputs.app_path }}
        env:
          VITE_BASE_PATH: https://storage.googleapis.com/${{ inputs.GCS_BUCKET_NAME }}/
        run: npm run build

      # Confirm dist/ output before uploading artifact
      - name: Debug dist output
        if: inputs.deployment_type == 'frontend'
        run: find ${{ inputs.app_path }}/dist -type f | sort

      - name: Upload frontend build artifact
        if: inputs.deployment_type == 'frontend'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.app_path }}/dist
          retention-days: 1

      - name: Set up Docker Buildx
        if: inputs.deployment_type == 'backend'
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build and export backend Docker image
        if: inputs.deployment_type == 'backend'
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.app_path }}
          tags: |
            ${{ inputs.app_name }}:${{ github.sha }}
            ${{ inputs.app_name }}:latest
          load: true
          push: false
          outputs: type=docker,dest=/tmp/${{ inputs.app_name }}.tar
