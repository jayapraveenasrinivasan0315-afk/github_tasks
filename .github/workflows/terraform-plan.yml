name: Terraform Plan
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
    secret:
      WORKLOAD_IDENTITY_PROVIDER:
        description: 'Workload Identity Provider for GCP authentication'
      GCP_SERVICE_ACCOUNT:
        description: 'GCP Service Account email for authentication'
      GCP_PROJECT_ID:
        description: 'GCP Project ID'
      GCP_REGION:
        description: 'GCP Region for resource deployment'
      GCP_SERVICE_ACCOUNT:
        description: 'GCP Service Account key (JSON) for authentication'
jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: terraform fmt
        working-directory: ./infra
        run: terraform fmt -check
      - name: Terraform Init
        working-directory: ./infra
        run: terraform init \
          -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
          -backend-config="prefix=${{ github.event.inputs.environment }}/terraform"
      - name: terraform validate
        working-directory: ./infra
        run: terraform validate
      - name: terraform plan
        working-directory: ./infra
        run: terraform plan \
          -var="project_id=${{ vars.GCP_PROJECT_ID }}" \
          -var="region=${{ vars.GCP_REGION }}" \
          -var="environment=${{ github.event.inputs.environment }}" \
          -var-file=../environments/${{ github.event.inputs.environment }}/variables.tfvars \
          -out=tfplan
      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}-${{ github.run_number }}
          path: infra/tfplan
          retention-days: 7
      
