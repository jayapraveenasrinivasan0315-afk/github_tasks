name: Terraform Plan
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'development'
permissions:
  contents: read
  id-token: write
  security-events: write
jobs:
  plan:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_01 }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Initialize Terraform (Dev)
        run: terraform init -backend-config="bucket=${{ secrets.GCP_TF_STATE_BUCKET }}" -backend-config="prefix=terraform/state/dev"
        working-directory: ./
      - name: terraform fmt
        run: terraform fmt -check
        working-directory: ./
        continue-on-error: true
      - name: terraform validate
        run: terraform validate
        working-directory: ./
      - name: Terraform Plan
        id: plan
        run: |
         terraform plan \
           -var-file="environment/dev/terraform.tfvars" \
           -out=tfplan.binary
        working-directory: ./
        continue-on-error: true
      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}-${{ github.run_number}}
          path: tfplan
          retention-days: 7
      
